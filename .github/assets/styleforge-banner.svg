  <rect x="910" y="286" width="246" height="24" rx="12" fill="url(#logo)"/>
  <rect x="1096" y="194" width="60" height="92" rx="20" fill="#142435"/>
  <circle cx="1126" cy="222" r="18" fill="#2AC4B7" fill-opacity="0.25"/>
  <rect x="1108" y="252" width="36" height="10" rx="5" fill="#FFF0D7" fill-opacity="0.2"/>

  <rect x="886" y="354" width="178" height="176" rx="24" fill="#0F1A28" stroke="#243648"/>
